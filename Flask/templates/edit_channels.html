{% extends 'base.html' %}

{% block head %}
<title>Edit Channels</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
{% endblock %}

{% block body %}
<header>
    <div class="header-content" style="flex-direction: column; align-items: center;">
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Site Logo" class="site-logo">
        <h1>Edit Channels</h1>
    </div>
</header>

<div class="container">
    <div class="content">
        <h3>Manage Channels</h3>
        <ul>
            {% for channel in channels %}
            <li>Channel {{ channel.id }} - Type: {{ channel.type }}</li>
            {% endfor %}
        </ul>
    </div>
</div>

<footer>
    <p style="text-align: center;">© 2025 Audio Manager</p>
</footer>
{% endblock %}
